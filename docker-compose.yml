services:
  postgres:
    image: postgres:16-alpine
    container_name: clinic-emr-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: clinic_emr
    ports:
      - "5432:5432"
    volumes:
      - clinic_emr_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d clinic_emr"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  clinic_emr_postgres_data:
